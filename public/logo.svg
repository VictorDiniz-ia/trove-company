<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#060e1e"/>
    </linearGradient>
    <linearGradient id="sg1" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#cdd4de"/>
      <stop offset="20%" stop-color="#edf0f6"/>
      <stop offset="55%" stop-color="#aeb8c6"/>
      <stop offset="80%" stop-color="#c6ceda"/>
      <stop offset="100%" stop-color="#a4b0be"/>
    </linearGradient>
    <linearGradient id="sg2" x1="85%" y1="0%" x2="15%" y2="100%">
